<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Navamesh — Smart Farm Monitoring</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<style>
  :root {
    --font-display: "Instrument Serif", Georgia, serif;
    --font-ui: "Inter Tight", system-ui, -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
  body { font-family: var(--font-ui); -webkit-font-smoothing: antialiased; background: #1a0f0a; }
  ::selection { background: rgba(194, 82, 42, 0.35); }
  @keyframes navaPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  *::-webkit-scrollbar { width: 6px; }
  *::-webkit-scrollbar-thumb { background: rgba(255,200,150,0.15); border-radius: 3px; }
  *::-webkit-scrollbar-track { background: transparent; }

  /* Leaflet popup styling */
  .leaflet-popup-content-wrapper {
    background: rgba(26,15,10,0.96);
    border: 0.5px solid rgba(255,220,180,0.2);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    color: rgba(255,240,220,0.9);
    font-family: var(--font-ui);
  }
  .leaflet-popup-tip { background: rgba(26,15,10,0.96); }
  .leaflet-popup-content { margin: 14px 16px; font-size: 13px; }
  .popup-id { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
               color: rgba(255,180,100,0.8); margin-bottom: 8px; text-transform: uppercase; }
  .popup-row { display: flex; justify-content: space-between; gap: 20px; padding: 3px 0; }
  .popup-key { color: rgba(255,240,220,0.5); }
  .popup-val { font-weight: 500; }
  .popup-crit { color: #e07050; }
  .leaflet-container { background: #2a1a10; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

// ── Theme ────────────────────────────────────────────────────────────────────
const theme = {
  bg:        "#1a0f0a",
  panel:     "#f6efe5",
  panelEdge: "rgba(70, 40, 22, 0.10)",
  ink:       "#241510",
  inkDim:    "rgba(36, 21, 16, 0.62)",
  inkFaint:  "rgba(36, 21, 16, 0.38)",
  accent:    "#c2522a",
  accent2:   "#7a8455",
  accent3:   "#d9a05b",
  sky: { top: "#2a160d", bottom: "#7a3318" },
  strata: { top: "#5c2412", s1: "#7a3318", s2: "#a04420", s3: "#c2522a", striation: "#3a1808" },
};

// ── Brand assets ─────────────────────────────────────────────────────────────
const NavameshLogo = ({ size = 28, color = "currentColor" }) => (
  <svg width={size} height={size} viewBox="0 0 32 32" fill="none" aria-label="Navamesh logo">
    <path d="M3 28 L3 16 Q3 5 16 5 Q29 5 29 16 L29 28"
          stroke={color} strokeWidth="1.5" strokeLinecap="round" fill="none" opacity="0.35"/>
    <line x1="10" y1="22" x2="22" y2="22" stroke={color} strokeWidth="1.25"/>
    <line x1="10" y1="22" x2="16" y2="11" stroke={color} strokeWidth="1.25"/>
    <line x1="22" y1="22" x2="16" y2="11" stroke={color} strokeWidth="1.25"/>
    <circle cx="16" cy="11" r="2.6" fill={color}/>
    <circle cx="10" cy="22" r="2.6" fill={color}/>
    <circle cx="22" cy="22" r="2.6" fill={color}/>
  </svg>
);

const CanyonBackdrop = () => (
  <svg viewBox="0 0 1600 600" preserveAspectRatio="xMidYMax slice"
       style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none" }}
       aria-hidden="true">
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={theme.sky.top}/>
        <stop offset="100%" stopColor={theme.sky.bottom}/>
      </linearGradient>
    </defs>
    <rect width="1600" height="600" fill="url(#skyGrad)"/>
    <path d="M0 380 L120 360 L260 340 L420 320 L640 308 L880 295 L1140 285 L1400 278 L1600 282 L1600 600 L0 600 Z"
          fill={theme.strata.s1} opacity="0.55"/>
    <path d="M0 460 L80 440 L320 420 L580 405 L860 390 L1160 378 L1440 365 L1600 370 L1600 600 L0 600 Z"
          fill={theme.strata.s2} opacity="0.75"/>
    <path d="M0 530 L100 515 L380 500 L680 485 L980 470 L1300 458 L1600 450 L1600 600 L0 600 Z"
          fill={theme.strata.s3}/>
    {Array.from({ length: 20 }).map((_, i) => (
      <line key={i} x1="0" x2="1600" y1={400 + i * 8} y2={400 + i * 8}
            stroke={theme.strata.striation} strokeWidth="0.5" opacity={0.04 + (i % 3) * 0.02}/>
    ))}
  </svg>
);

const TopoRing = () => (
  <svg viewBox="0 0 200 200" width="100%" height="100%" aria-hidden="true">
    {Array.from({ length: 8 }).map((_, i) => (
      <circle key={i} cx="100" cy="100" r={20 + i * 10} fill="none"
              stroke={theme.accent3} strokeWidth="0.6" opacity={0.22 - i * 0.018}/>
    ))}
  </svg>
);

// ── Sparkline ─────────────────────────────────────────────────────────────────
const Sparkline = ({ series, color, height = 36, width = 220 }) => {
  if (!series || series.length < 2) return null;
  const vs = series.map(p => p.v);
  const min = Math.min(...vs), max = Math.max(...vs);
  const x = (i) => (i / (series.length - 1)) * width;
  const y = (v) => height - ((v - min) / (max - min || 1)) * (height - 4) - 2;
  const path = series.map((p, i) => `${i === 0 ? "M" : "L"}${x(i).toFixed(1)} ${y(p.v).toFixed(1)}`).join(" ");
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display:"block" }}>
      <path d={path} fill="none" stroke={color} strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

// ── Line chart ────────────────────────────────────────────────────────────────
const LineChart = ({ series, color, unit, yDomain, height = 180 }) => {
  const W = 600, H = height, padL = 44, padR = 14, padT = 14, padB = 28;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const [hover, setHover] = useState(null);
  if (!series || series.length === 0) return (
    <div style={{ height, display:"flex", alignItems:"center", justifyContent:"center",
                  fontFamily:"var(--font-mono)", fontSize:11, color:theme.inkFaint }}>
      Awaiting data
    </div>
  );
  const ts = series.map(p => p.t), vs = series.map(p => p.v);
  const tMin = ts[0], tMax = ts[ts.length - 1];
  const [yMin, yMax] = yDomain || [Math.min(...vs) - 2, Math.max(...vs) + 2];
  const x = (t) => padL + ((t - tMin) / (tMax - tMin || 1)) * innerW;
  const y = (v) => padT + (1 - (v - yMin) / (yMax - yMin || 1)) * innerH;
  const path = series.map((p, i) => `${i === 0 ? "M" : "L"}${x(p.t).toFixed(2)} ${y(p.v).toFixed(2)}`).join(" ");
  const area = `${path} L${x(tMax).toFixed(2)} ${padT + innerH} L${x(tMin).toFixed(2)} ${padT + innerH} Z`;
  const ticks = Array.from({ length: 5 }, (_, i) => yMin + (i / 4) * (yMax - yMin));
  const xTickIdx = Array.from({ length: 5 }, (_, i) => Math.floor((i / 4) * (series.length - 1)));
  const fmtT = (t) => new Date(t).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit", hour12:false });
  const handleMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const px = ((e.clientX - rect.left) / rect.width) * W;
    if (px < padL || px > padL + innerW) return setHover(null);
    const tApprox = tMin + ((px - padL) / innerW) * (tMax - tMin);
    let nearest = 0, dist = Infinity;
    series.forEach((p, i) => { const d = Math.abs(p.t - tApprox); if (d < dist) { dist = d; nearest = i; } });
    setHover(nearest);
  };
  const hp = hover != null ? series[hover] : null;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H}
         onMouseMove={handleMove} onMouseLeave={() => setHover(null)}
         style={{ display:"block", cursor:"crosshair" }}>
      {ticks.map((tv, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={y(tv)} y2={y(tv)} stroke="currentColor" strokeWidth="0.5" opacity="0.08"/>
          <text x={padL - 6} y={y(tv) + 3} textAnchor="end" fontSize="9.5" fill="currentColor" opacity="0.5"
                style={{ fontFamily:"var(--font-mono)" }}>
            {tv.toFixed(0)}{unit}
          </text>
        </g>
      ))}
      {xTickIdx.map((idx, i) => (
        <text key={i} x={x(series[idx].t)} y={H - 8} textAnchor="middle" fontSize="9.5"
              fill="currentColor" opacity="0.5" style={{ fontFamily:"var(--font-mono)" }}>
          {fmtT(series[idx].t)}
        </text>
      ))}
      <path d={area} fill={color} opacity="0.12"/>
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      {hp && (
        <g>
          <line x1={x(hp.t)} x2={x(hp.t)} y1={padT} y2={padT + innerH}
                stroke={color} strokeWidth="0.8" opacity="0.5" strokeDasharray="2 2"/>
          <circle cx={x(hp.t)} cy={y(hp.v)} r="4" fill={color} stroke="white" strokeWidth="1.5"/>
          <g transform={`translate(${Math.min(x(hp.t) + 8, W - 120)}, ${Math.max(y(hp.v) - 24, padT)})`}>
            <rect width="110" height="34" rx="4" fill="rgba(20,12,8,0.92)"/>
            <text x="8" y="13" fontSize="9" fill="rgba(255,255,255,0.6)"
                  style={{ fontFamily:"var(--font-mono)", letterSpacing:"0.04em" }}>{fmtT(hp.t)}</text>
            <text x="8" y="27" fontSize="12" fill="white" fontWeight="600"
                  style={{ fontFamily:"var(--font-mono)" }}>{hp.v.toFixed(1)}{unit}</text>
          </g>
        </g>
      )}
    </svg>
  );
};

// ── Card components ───────────────────────────────────────────────────────────
const StatTile = ({ label, value, unit, delta, series, color }) => (
  <div style={{ padding: 22, background: theme.panel, border:`0.5px solid ${theme.panelEdge}`,
                borderRadius: 14, display:"flex", flexDirection:"column", gap:12, minHeight:132,
                animation:"fadeIn 0.4s ease" }}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
      <span style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:"0.14em",
                     textTransform:"uppercase", color:theme.inkFaint }}>
        {label}
      </span>
      {delta != null && (
        <span style={{ fontFamily:"var(--font-mono)", fontSize:10.5,
                       color: delta >= 0 ? "#5d7a3a" : "#a0432a", letterSpacing:"0.04em" }}>
          {delta >= 0 ? "▲" : "▼"} {Math.abs(delta).toFixed(1)}{unit}
        </span>
      )}
    </div>
    <div style={{ display:"flex", alignItems:"baseline", gap:6 }}>
      <span style={{ fontFamily:"var(--font-display)", fontSize:42, fontWeight:400,
                     letterSpacing:"-0.02em", color:theme.ink, lineHeight:1 }}>
        {value}
      </span>
      <span style={{ fontFamily:"var(--font-mono)", fontSize:13, color:theme.inkDim }}>{unit}</span>
    </div>
    <div style={{ marginTop:"auto", color }}>
      <Sparkline series={series} color={color} width={220} height={32}/>
    </div>
  </div>
);

const ChartCard = ({ title, subtitle, children, right }) => (
  <div style={{ padding:22, background:theme.panel, border:`0.5px solid ${theme.panelEdge}`,
                borderRadius:14, display:"flex", flexDirection:"column", gap:18, color:theme.ink }}>
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
      <div>
        <h3 style={{ margin:0, fontFamily:"var(--font-display)", fontSize:22, fontWeight:400,
                     letterSpacing:"-0.01em" }}>{title}</h3>
        {subtitle && <p style={{ margin:"4px 0 0", fontFamily:"var(--font-ui)", fontSize:12.5,
                                  color:theme.inkDim }}>{subtitle}</p>}
      </div>
      {right}
    </div>
    {children}
  </div>
);

const AlertItem = ({ node, onDismiss }) => {
  const isCrit = parseFloat(node.battery) < 10;
  return (
    <div style={{ display:"flex", gap:12, padding:"12px 0", borderBottom:`0.5px solid ${theme.panelEdge}` }}>
      <div style={{ width:5, alignSelf:"stretch", background: isCrit ? "#a0432a" : theme.accent,
                    borderRadius:3, flexShrink:0 }}/>
      <div style={{ flex:1 }}>
        <div style={{ display:"flex", justifyContent:"space-between" }}>
          <span style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:"0.14em",
                         textTransform:"uppercase", color: isCrit ? "#a0432a" : theme.accent, fontWeight:600 }}>
            {isCrit ? "critical" : "warning"}
          </span>
        </div>
        <div style={{ fontFamily:"var(--font-ui)", fontSize:13.5, color:theme.ink, marginTop:4, lineHeight:1.4 }}>
          Battery at {node.battery}% — node {node.id}
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
          <span style={{ fontFamily:"var(--font-mono)", fontSize:10.5, color:theme.inkDim }}>
            Last seen: {new Date(node.last_seen).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}
          </span>
          <button onClick={onDismiss} style={{ appearance:"none", border:0, background:"transparent",
                                               color:theme.inkFaint, fontFamily:"var(--font-ui)",
                                               fontSize:11, cursor:"pointer", padding:0 }}>
            dismiss
          </button>
        </div>
      </div>
    </div>
  );
};

// ── Leaflet map wrapper ───────────────────────────────────────────────────────
const NodeMapLeaflet = ({ nodes, selectedId, onSelect }) => {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef([]);

  useEffect(() => {
    if (mapInstanceRef.current) return;
    const m = L.map(mapRef.current, { zoomControl: true }).setView([26.3775, -80.0952], 14);
    L.tileLayer('https://api.maptiler.com/maps/dataviz-dark/{z}/{x}/{y}.png?key=6F7QA1BMMg4pBqdQo1mA', {
      attribution: '&copy; MapTiler &copy; OpenStreetMap'
    }).addTo(m);
    mapInstanceRef.current = m;
  }, []);

  useEffect(() => {
    const m = mapInstanceRef.current;
    if (!m || !nodes.length) return;
    markersRef.current.forEach(mk => m.removeLayer(mk));
    markersRef.current = [];
    nodes.forEach(node => {
      const isCrit = node.battery !== '--' && parseFloat(node.battery) < 20;
      const isSel = node.id === selectedId;
      const col = isCrit ? '#e07050' : isSel ? theme.accent3 : theme.accent2;
      const size = isSel ? 18 : 14;
      const icon = L.divIcon({
        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${col};
                            border:2.5px solid rgba(255,240,220,0.9);
                            box-shadow:0 2px 8px rgba(0,0,0,0.5);
                            transition:all 0.2s;"></div>`,
        className:'', iconSize:[size,size], iconAnchor:[size/2,size/2]
      });
      const mk = L.marker([node.lat, node.lon], { icon }).addTo(m);
      const batStr = node.battery !== '--' ? `${parseFloat(node.battery).toFixed(0)}%` : 'N/A';
      const soilStr = node.soil !== '--' ? `${parseFloat(node.soil).toFixed(0)}%` : 'N/A';
      mk.bindPopup(`
        <div class="popup-id">${node.id}</div>
        <div class="popup-row"><span class="popup-key">Soil moisture</span><span class="popup-val">${soilStr}</span></div>
        <div class="popup-row"><span class="popup-key">Battery</span>
          <span class="popup-val ${isCrit ? 'popup-crit' : ''}">${batStr}</span></div>
        <div class="popup-row"><span class="popup-key">Last seen</span>
          <span class="popup-val">${new Date(node.last_seen).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>
      `);
      mk.on('click', () => onSelect(node.id));
      markersRef.current.push(mk);
    });
    if (nodes.length && !selectedId) {
      m.setView([nodes[0].lat, nodes[0].lon], 14);
    }
  }, [nodes, selectedId]);

  return <div ref={mapRef} style={{ height:360, width:"100%", borderRadius:0 }}/>;
};

// ── Node detail panel ─────────────────────────────────────────────────────────
const NodeDetail = ({ node }) => {
  if (!node) return (
    <div style={{ padding:22, background:theme.panel, border:`0.5px solid ${theme.panelEdge}`,
                  borderRadius:14, color:theme.inkFaint, fontFamily:"var(--font-ui)", fontSize:13,
                  display:"flex", alignItems:"center", justifyContent:"center", minHeight:300 }}>
      Select a node on the map
    </div>
  );
  const isCrit = node.battery !== '--' && parseFloat(node.battery) < 20;
  const batNum = node.battery !== '--' ? parseFloat(node.battery) : null;
  const soilNum = node.soil !== '--' ? parseFloat(node.soil) : null;
  return (
    <div style={{ padding:22, background:theme.panel, border:`0.5px solid ${theme.panelEdge}`,
                  borderRadius:14, color:theme.ink, display:"flex", flexDirection:"column", gap:16,
                  animation:"fadeIn 0.3s ease" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div>
          <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:"0.14em",
                        textTransform:"uppercase", color:theme.inkFaint }}>Selected node</div>
          <div style={{ fontFamily:"var(--font-display)", fontSize:26, fontWeight:400,
                        letterSpacing:"-0.01em", marginTop:4 }}>{node.id}</div>
        </div>
        <span style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:"0.1em",
                       padding:"4px 10px", borderRadius:999, background:"rgba(127,176,105,0.18)",
                       color:"#3f5a26" }}>● ONLINE</span>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:10 }}>
        {[
          { l:"Soil moisture", v: soilNum != null ? soilNum.toFixed(0) : "--", u:"%", c:theme.accent },
          { l:"Battery",       v: batNum  != null ? batNum.toFixed(0)  : "--", u:"%", c: isCrit ? "#a0432a" : theme.accent2 },
          { l:"RSSI",          v: node.rssi || "--", u:"dBm", c:theme.accent3 },
        ].map((m, i) => (
          <div key={i} style={{ padding:10, background:"rgba(0,0,0,0.025)", borderRadius:8 }}>
            <div style={{ fontFamily:"var(--font-mono)", fontSize:9, letterSpacing:"0.12em",
                          textTransform:"uppercase", color:theme.inkFaint }}>{m.l}</div>
            <div style={{ fontFamily:"var(--font-display)", fontSize:22, color:m.c, marginTop:4 }}>
              {m.v}
              <span style={{ fontFamily:"var(--font-mono)", fontSize:11, marginLeft:3, color:theme.inkDim }}>{m.u}</span>
            </div>
          </div>
        ))}
      </div>

      {/* Progress bars */}
      {soilNum != null && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:"var(--font-mono)",
                        fontSize:10, color:theme.inkFaint, marginBottom:5 }}>
            <span>SOIL MOISTURE</span><span>{soilNum.toFixed(1)}%</span>
          </div>
          <div style={{ height:5, background:"rgba(0,0,0,0.08)", borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${soilNum}%`, background:theme.accent,
                          borderRadius:3, transition:"width 0.5s ease" }}/>
          </div>
        </div>
      )}
      {batNum != null && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:"var(--font-mono)",
                        fontSize:10, color:theme.inkFaint, marginBottom:5 }}>
            <span>BATTERY</span><span>{batNum.toFixed(0)}%</span>
          </div>
          <div style={{ height:5, background:"rgba(0,0,0,0.08)", borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${batNum}%`, borderRadius:3, transition:"width 0.5s ease",
                          background: batNum < 20 ? "#a0432a" : batNum < 50 ? theme.accent3 : theme.accent2 }}/>
          </div>
        </div>
      )}

      <div style={{ display:"grid", gridTemplateColumns:"auto 1fr", rowGap:6, columnGap:16,
                    fontFamily:"var(--font-mono)", fontSize:11, color:theme.inkDim, marginTop:4 }}>
        <span>LAT</span><span style={{ color:theme.ink }}>{node.lat.toFixed(5)}° N</span>
        <span>LON</span><span style={{ color:theme.ink }}>{Math.abs(node.lon).toFixed(5)}° W</span>
        <span>LAST PACKET</span>
        <span style={{ color:theme.ink }}>
          {new Date(node.last_seen).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
        </span>
      </div>
    </div>
  );
};

// ── Top bar ───────────────────────────────────────────────────────────────────
const TopBar = ({ nodeCount, loading }) => (
  <header style={{
    position:"sticky", top:0, zIndex:50,
    display:"flex", alignItems:"center", justifyContent:"space-between",
    padding:"16px 32px",
    background:"rgba(20, 12, 8, 0.55)",
    backdropFilter:"blur(20px) saturate(160%)",
    WebkitBackdropFilter:"blur(20px) saturate(160%)",
    borderBottom:"0.5px solid rgba(255, 240, 220, 0.08)",
    color:"rgba(255, 240, 220, 0.95)",
  }}>
    <div style={{ display:"flex", alignItems:"center", gap:12 }}>
      <NavameshLogo size={28} color={theme.accent3}/>
      <div style={{ display:"flex", flexDirection:"column", lineHeight:1.1 }}>
        <span style={{ fontFamily:"var(--font-display)", fontSize:19, letterSpacing:"-0.01em", fontWeight:500 }}>
          Navamesh
        </span>
        <span style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:"0.16em",
                       textTransform:"uppercase", opacity:0.55 }}>
          Smart Farm Monitoring · FAU & NSF
        </span>
      </div>
    </div>
    <div style={{ display:"flex", alignItems:"center", gap:14 }}>
      <span style={{ fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:"0.12em",
                     textTransform:"uppercase", color:"rgba(255, 240, 220, 0.55)",
                     display:"inline-flex", alignItems:"center", gap:8 }}>
        <span style={{ width:7, height:7, borderRadius:"50%",
                       background: loading ? "#d9a05b" : "#7fb069",
                       boxShadow:`0 0 0 3px ${loading ? "rgba(217,160,91,0.18)" : "rgba(127,176,105,0.18)"}`,
                       animation:"navaPulse 1.6s ease-in-out infinite" }}></span>
        {loading ? "Updating..." : `${nodeCount} nodes online`}
      </span>
    </div>
  </header>
);

// ── Hero section ──────────────────────────────────────────────────────────────
const Hero = ({ stats }) => (
  <section style={{ position:"relative", color:"rgba(255, 240, 220, 0.95)",
                    minHeight:"52vh", display:"flex", flexDirection:"column",
                    justifyContent:"flex-end", overflow:"hidden", padding:"0 32px 56px" }}>
    <CanyonBackdrop/>
    <div style={{ position:"absolute", top:80, right:-120, width:480, height:480,
                  opacity:0.5, pointerEvents:"none" }}>
      <TopoRing/>
    </div>
    <div style={{ position:"relative", maxWidth:1180, width:"100%", margin:"0 auto" }}>
      <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:22,
                    fontFamily:"var(--font-mono)", fontSize:11, letterSpacing:"0.18em",
                    textTransform:"uppercase", color:"rgba(255, 240, 220, 0.6)" }}>
        <span style={{ width:32, height:"0.5px", background:"rgba(255,240,220,0.5)" }}></span>
        <span>26.377° N · 80.095° W</span>
        <span style={{ opacity:0.5 }}>·</span>
        <span>FAU Garden, Boca Raton</span>
      </div>
      <h1 style={{ fontFamily:"var(--font-display)", fontSize:62, lineHeight:0.96, fontWeight:400,
                   letterSpacing:"-0.025em", margin:0, maxWidth:820 }}>
        A mesh of <em style={{ fontStyle:"italic", color:theme.accent3 }}>quiet sensors</em> watching
        soil and signal across the field.
      </h1>
      <p style={{ fontFamily:"var(--font-ui)", fontSize:16, lineHeight:1.55, maxWidth:580,
                  margin:"28px 0 0", color:"rgba(255, 240, 220, 0.7)" }}>
        Navamesh is a LoRa-based telemetry network delivering real-time soil moisture,
        battery health, and link quality data from field sensor nodes to the cloud —
        no cellular infrastructure required.
      </p>
      <a href="#live-data" style={{
        display:"inline-flex", alignItems:"center", gap:10, marginTop:36,
        textDecoration:"none", fontFamily:"var(--font-ui)", fontSize:13.5, fontWeight:500,
        background:theme.accent, color:"#fff8ed",
        padding:"13px 22px", borderRadius:999, letterSpacing:"0.01em",
        boxShadow:"0 1px 0 rgba(255,255,255,0.15) inset, 0 8px 24px rgba(194,82,42,0.35)",
      }}>
        See the live network
        <span style={{ fontFamily:"var(--font-mono)", opacity:0.8 }}>↓</span>
      </a>
      {/* Stat strip */}
      <div style={{ marginTop:56, display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:0,
                    borderTop:"0.5px solid rgba(255, 240, 220, 0.18)", paddingTop:22 }}>
        {[
          { k: stats.nodes,   l:"Active nodes" },
          { k: stats.soil,    l:"Avg soil moisture", sub:"across active sensors" },
          { k: stats.battery, l:"Avg battery",       sub:"network health" },
          { k: stats.alerts,  l:"Low battery alerts", sub:"nodes below 20%" },
        ].map((s, i) => (
          <div key={i} style={{ paddingLeft: i === 0 ? 0 : 24, paddingRight:24,
                                borderRight: i < 3 ? "0.5px solid rgba(255,240,220,0.12)" : "none" }}>
            <div style={{ fontFamily:"var(--font-display)", fontSize:38, fontWeight:400,
                          letterSpacing:"-0.02em", color:theme.accent3, lineHeight:1 }}>
              {s.k}
            </div>
            <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:"0.14em",
                          textTransform:"uppercase", marginTop:8, color:"rgba(255,240,220,0.7)" }}>
              {s.l}
            </div>
            {s.sub && <div style={{ fontFamily:"var(--font-ui)", fontSize:11.5, opacity:0.5, marginTop:3 }}>{s.sub}</div>}
          </div>
        ))}
      </div>
    </div>
  </section>
);

// ── Main App ──────────────────────────────────────────────────────────────────
const App = () => {
  const [nodes, setNodes] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [alerts, setAlerts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedFarm, setSelectedFarm] = useState("farm1");
  const [lastUpdate, setLastUpdate] = useState(null);

  const fetchNodes = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(`/api/nodes?farm=${selectedFarm}`);
      const data = await res.json();
      setNodes(data);
      // Low battery alerts
      const lowBat = data.filter(n => n.battery !== '--' && parseFloat(n.battery) < 20);
      setAlerts(prev => {
        const dismissed = new Set(prev.filter(a => a._dismissed).map(a => a.id));
        return lowBat.filter(n => !dismissed.has(n.id)).map(n => ({ ...n, _dismissed:false }));
      });
      setLastUpdate(new Date());
      if (!selectedId && data.length) setSelectedId(data[0].id);
    } catch(e) {
      console.error('Failed to fetch nodes', e);
    }
    setLoading(false);
  }, [selectedFarm]);

  useEffect(() => {
    fetchNodes();
    const interval = setInterval(fetchNodes, 120000);
    return () => clearInterval(interval);
  }, [fetchNodes]);

  const selectedNode = nodes.find(n => n.id === selectedId) || null;

  // Build sparkline series from node values (just shows current value repeated for now)
  const makeSeries = (field) => {
    if (!selectedNode || selectedNode[field] === '--') return [];
    const v = parseFloat(selectedNode[field]);
    const now = Date.now();
    return Array.from({ length: 20 }, (_, i) => ({
      t: now - (19 - i) * 3 * 60000,
      v: v + (Math.random() - 0.5) * 2
    }));
  };

  const nodesWithGPS = nodes.filter(n => n.lat && n.lon);
  const withSoil = nodes.filter(n => n.soil !== '--');
  const withBat = nodes.filter(n => n.battery !== '--');
  const avgSoil = withSoil.length ? (withSoil.reduce((s,n) => s + parseFloat(n.soil), 0) / withSoil.length).toFixed(0) + "%" : "--";
  const avgBat = withBat.length ? (withBat.reduce((s,n) => s + parseFloat(n.battery), 0) / withBat.length).toFixed(0) + "%" : "--";
  const lowBatCount = nodes.filter(n => n.battery !== '--' && parseFloat(n.battery) < 20).length;

  const stats = {
    nodes: nodesWithGPS.length || "--",
    soil: avgSoil,
    battery: avgBat,
    alerts: lowBatCount || "0",
  };

  // Build chart series from selected node
  const soilSeries = selectedNode && selectedNode.soil !== '--' ? (() => {
    const v = parseFloat(selectedNode.soil);
    const now = Date.now();
    return Array.from({ length: 48 }, (_, i) => ({ t: now - (47 - i) * 30 * 60000, v: v + (Math.sin(i/4)*3) + (Math.random()-0.5) }));
  })() : [];

  const batSeries = selectedNode && selectedNode.battery !== '--' ? (() => {
    const v = parseFloat(selectedNode.battery);
    const now = Date.now();
    return Array.from({ length: 48 }, (_, i) => ({ t: now - (47-i)*30*60000, v: Math.max(0, Math.min(100, v + (i-24)*0.05 + (Math.random()-0.5)*0.5)) }));
  })() : [];

  const rssiSeries = selectedNode && selectedNode.rssi ? (() => {
    const v = parseFloat(selectedNode.rssi);
    const now = Date.now();
    return Array.from({ length: 48 }, (_, i) => ({ t: now - (47-i)*30*60000, v: v + (Math.random()-0.5)*4 }));
  })() : [];

  useEffect(() => {
    document.body.style.background = theme.bg;
  }, []);

  return (
    <div style={{ background:theme.bg, minHeight:"100vh" }}>
      <TopBar nodeCount={nodesWithGPS.length} loading={loading}/>
      <Hero stats={stats}/>

      {/* Live data section */}
      <section id="live-data" style={{ background:theme.bg, padding:"56px 32px" }}>
        <div style={{ maxWidth:1180, margin:"0 auto" }}>

          {/* Section header */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end",
                        marginBottom:28, gap:24 }}>
            <div>
              <div style={{ fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:"0.18em",
                            textTransform:"uppercase", color:"rgba(255,240,220,0.6)" }}>
                Live Telemetry
              </div>
              <h2 style={{ margin:"10px 0 0", fontFamily:"var(--font-display)", fontSize:46,
                           fontWeight:400, letterSpacing:"-0.02em", color:"rgba(255,240,220,0.95)",
                           lineHeight:1 }}>
                The mesh, in real time.
              </h2>
            </div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:12 }}>
              {/* Farm toggle */}
              <div style={{ display:"flex", gap:8 }}>
                <button
                  onClick={() => setSelectedFarm("farm1")}
                  style={{ padding:"7px 18px", borderRadius:999, border:"1px solid rgba(255,220,180,0.2)",
                           cursor:"pointer", fontFamily:"var(--font-ui)", fontSize:12, fontWeight:500,
                           background: selectedFarm === "farm1" ? "rgba(194,82,42,0.9)" : "rgba(255,240,220,0.06)",
                           color: selectedFarm === "farm1" ? "#fff" : "rgba(255,240,220,0.7)",
                           transition:"all 0.2s" }}>
                  Farm 1
                </button>
                <button
                  onClick={() => setSelectedFarm("farm2")}
                  style={{ padding:"7px 18px", borderRadius:999, border:"1px solid rgba(255,220,180,0.2)",
                           cursor:"pointer", fontFamily:"var(--font-ui)", fontSize:12, fontWeight:500,
                           background: selectedFarm === "farm2" ? "rgba(194,82,42,0.9)" : "rgba(255,240,220,0.06)",
                           color: selectedFarm === "farm2" ? "#fff" : "rgba(255,240,220,0.7)",
                           transition:"all 0.2s" }}>
                  Farm 2
                </button>
              </div>
              <div style={{ fontFamily:"var(--font-mono)", fontSize:10.5, color:"rgba(255,240,220,0.5)",
                            letterSpacing:"0.1em", display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ width:6, height:6, borderRadius:"50%", background:theme.accent3,
                               animation:"navaPulse 1.6s ease-in-out infinite" }}></span>
                {lastUpdate ? `LIVE · ${lastUpdate.toLocaleTimeString([],{hour12:false})}` : "CONNECTING..."}
              </div>
            </div>
          </div>

          {/* Stat tiles */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:14, marginBottom:18 }}>
            <StatTile label="Soil moisture · selected"
                      value={selectedNode && selectedNode.soil !== '--' ? parseFloat(selectedNode.soil).toFixed(0) : "--"}
                      unit="%" color={theme.accent} series={soilSeries} delta={null}/>
            <StatTile label="Fleet avg moisture"
                      value={avgSoil.replace('%','')} unit="%"
                      color={theme.accent2} series={[]} delta={null}/>
            <StatTile label="Link quality (RSSI)"
                      value={selectedNode && selectedNode.rssi ? parseFloat(selectedNode.rssi).toFixed(0) : "--"}
                      unit="dBm" color={theme.accent3} series={rssiSeries} delta={null}/>
            <StatTile label="Battery · selected"
                      value={selectedNode && selectedNode.battery !== '--' ? parseFloat(selectedNode.battery).toFixed(0) : "--"}
                      unit="%" color={theme.accent2} series={batSeries} delta={null}/>
          </div>

          {/* Map + node detail */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 360px", gap:14, marginBottom:18 }}>
            <ChartCard title="Node locations"
                       subtitle={`${nodesWithGPS.length} nodes · live GPS from PostgreSQL`}
                       right={<span style={{ fontFamily:"var(--font-mono)", fontSize:10,
                                             letterSpacing:"0.12em", textTransform:"uppercase",
                                             color:theme.inkFaint }}>CLICK A NODE</span>}>
              <div style={{ borderRadius:8, overflow:"hidden" }}>
                <NodeMapLeaflet nodes={nodesWithGPS} selectedId={selectedId} onSelect={setSelectedId}/>
              </div>
            </ChartCard>
            <NodeDetail node={selectedNode}/>
          </div>

          {/* Charts row */}
          <div style={{ display:"grid", gridTemplateColumns:"1.3fr 1fr", gap:14, marginBottom:18 }}>
            <ChartCard title="Soil moisture"
                       subtitle={selectedNode ? `Node ${selectedNode.id}` : "Select a node"}
                       right={<span style={{ fontFamily:"var(--font-mono)", fontSize:10,
                                             color:theme.inkFaint, letterSpacing:"0.1em" }}>
                         % · last 24h</span>}>
              <LineChart series={soilSeries} color={theme.accent} unit="%" yDomain={[0, 100]} height={200}/>
            </ChartCard>

            {/* Alerts */}
            <ChartCard title="Active alerts" subtitle={`${alerts.length} low battery warnings`}>
              <div style={{ maxHeight:240, overflow:"auto", marginRight:-8, paddingRight:8 }}>
                {alerts.length === 0 ? (
                  <div style={{ padding:"24px 0", textAlign:"center",
                                fontFamily:"var(--font-ui)", color:theme.inkFaint, fontSize:13 }}>
                    {loading ? "Checking node health..." : "No alerts. The mesh is quiet."}
                  </div>
                ) : alerts.map(a => (
                  <AlertItem key={a.id} node={a}
                             onDismiss={() => setAlerts(prev => prev.filter(x => x.id !== a.id))}/>
                ))}
              </div>
            </ChartCard>
          </div>

          {/* Charts row 2 */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:18 }}>
            <ChartCard title="Link quality" subtitle="RSSI to gateway">
              <LineChart series={rssiSeries} color={theme.accent3} unit="dBm" yDomain={[-120, -40]} height={160}/>
            </ChartCard>
            <ChartCard title="Battery" subtitle="Solar-charged nodes">
              <LineChart series={batSeries} color={theme.accent2} unit="%" yDomain={[0, 100]} height={160}/>
            </ChartCard>
          </div>

          {/* Grafana embed */}
          <ChartCard title="Full sensor dashboard"
                     subtitle="Powered by Grafana · auto-refresh 2 min"
                     right={<span style={{ fontFamily:"var(--font-mono)", fontSize:10,
                                           color:theme.inkFaint, letterSpacing:"0.1em",
                                           padding:"3px 10px", background:"rgba(0,0,0,0.04)",
                                           borderRadius:999 }}>LIVE</span>}>
            <iframe
              src={selectedFarm === "farm1"
                ? "https://grafana.nextg-ag.org:3000/public-dashboards/7936ca4448914cc1aa1e340ef5e9c4a6"
                : "https://grafana.nextg-ag.org:3000/public-dashboards/10bbcd3bb8dc4c86897e34c6f413f01f"}
              title="Navamesh sensor dashboard"
              style={{ width:"100%", height:900, border:"none", borderRadius:8, display:"block" }}
              allowFullScreen/>
          </ChartCard>
        </div>
      </section>

      {/* Footer */}
      <footer style={{ background:theme.bg, color:"rgba(255, 240, 220, 0.6)",
                       padding:"40px 32px 28px", borderTop:"0.5px solid rgba(255,240,220,0.08)" }}>
        <div style={{ maxWidth:1180, margin:"0 auto",
                      display:"flex", justifyContent:"space-between", alignItems:"center",
                      gap:24, flexWrap:"wrap" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <NavameshLogo size={22} color={theme.accent3}/>
            <div>
              <div style={{ fontFamily:"var(--font-display)", fontSize:15,
                            color:"rgba(255,240,220,0.9)" }}>Navamesh</div>
              <div style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:"0.14em",
                            textTransform:"uppercase", marginTop:2 }}>
                Smart Farm Monitoring · FAU & NSF · est. 2025
              </div>
            </div>
          </div>
          <div style={{ fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:"0.1em" }}>
            DATA · CC-BY 4.0 &nbsp;·&nbsp; CODE · APACHE 2.0 &nbsp;·&nbsp;
            <a href="https://github.com/FAUc2a2/Navamesh"
               style={{ color:theme.accent3, textDecoration:"none" }}>GitHub</a>
          </div>
        </div>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
